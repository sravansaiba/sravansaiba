name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      # ── Streak — demolab hosts their own instance, stays up ────────────
      - name: Download streak card
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://streak-stats.demolab.com/?user=sravansaiba&theme=tokyonight&hide_border=true" \
            -o assets/streak.svg
          if grep -q "<svg" assets/streak.svg; then
            echo "✅ streak.svg OK ($(wc -c < assets/streak.svg) bytes)"
          else
            echo "⚠️ streak.svg invalid"
            git checkout -- assets/streak.svg 2>/dev/null || rm -f assets/streak.svg
          fi

      # ── Profile summary cards — completely different service ────────────
      # github-profile-summary-cards has its own Vercel deployment
      - name: Download profile summary (stats replacement)
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=sravansaiba&theme=tokyonight" \
            -o assets/stats.svg
          if grep -q "<svg" assets/stats.svg; then
            echo "✅ stats.svg OK ($(wc -c < assets/stats.svg) bytes)"
          else
            echo "⚠️ stats.svg invalid"
            git checkout -- assets/stats.svg 2>/dev/null || rm -f assets/stats.svg
          fi

      # ── Languages — from profile-summary-cards too ────────────────────
      - name: Download languages card
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=sravansaiba&theme=tokyonight" \
            -o assets/langs.svg
          if grep -q "<svg" assets/langs.svg; then
            echo "✅ langs.svg OK ($(wc -c < assets/langs.svg) bytes)"
          else
            echo "⚠️ langs.svg invalid"
            git checkout -- assets/langs.svg 2>/dev/null || rm -f assets/langs.svg
          fi

      # ── Productive time card (bonus — looks great) ─────────────────────
      - name: Download productive time card
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=sravansaiba&theme=tokyonight&utcOffset=5.5" \
            -o assets/productive.svg
          if grep -q "<svg" assets/productive.svg; then
            echo "✅ productive.svg OK ($(wc -c < assets/productive.svg) bytes)"
          else
            echo "⚠️ productive.svg invalid"
            git checkout -- assets/productive.svg 2>/dev/null || rm -f assets/productive.svg
          fi

      # ── Snake animation ────────────────────────────────────────────────
      - name: Generate snake (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sravansaiba
          outputs: assets/snake-dark.svg?palette=github-dark

      - name: Generate snake (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sravansaiba
          outputs: assets/snake-light.svg?palette=github

      - name: List assets
        run: ls -lh assets/

      - name: Commit assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update readme stats [skip ci]"
          git push
