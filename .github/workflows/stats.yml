name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      # ── GitHub Stats card ──────────────────────────────────────────────
      # Uses a self-deployed instance — more reliable than the shared one
      - name: Download stats card
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github-readme-stats.vercel.app/api?username=sravansaiba&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true&rank_icon=github&cache_seconds=1800" \
            -o assets/stats.svg
          # Validate it's actually an SVG, not an error page
          if ! grep -q "<svg" assets/stats.svg; then
            echo "⚠️ stats.svg is not a valid SVG — keeping previous version"
            git checkout -- assets/stats.svg 2>/dev/null || rm -f assets/stats.svg
          else
            echo "✅ stats.svg OK ($(wc -c < assets/stats.svg) bytes)"
          fi

      # ── Streak card — uses demolab which is more stable ────────────────
      - name: Download streak card
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://streak-stats.demolab.com/?user=sravansaiba&theme=tokyonight&hide_border=true&cache_seconds=1800" \
            -o assets/streak.svg
          if ! grep -q "<svg" assets/streak.svg; then
            echo "⚠️ streak.svg invalid — keeping previous"
            git checkout -- assets/streak.svg 2>/dev/null || rm -f assets/streak.svg
          else
            echo "✅ streak.svg OK ($(wc -c < assets/streak.svg) bytes)"
          fi

      # ── Top Languages — use a different instance ───────────────────────
      - name: Download top languages card
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=sravansaiba&layout=compact&theme=tokyonight&hide_border=true&langs_count=8&hide=html,css&card_width=500&cache_seconds=1800" \
            -o assets/langs.svg
          if ! grep -q "<svg" assets/langs.svg; then
            echo "⚠️ langs.svg invalid — keeping previous"
            git checkout -- assets/langs.svg 2>/dev/null || rm -f assets/langs.svg
          else
            echo "✅ langs.svg OK ($(wc -c < assets/langs.svg) bytes)"
          fi

      # ── Snake animation ────────────────────────────────────────────────
      - name: Generate snake (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sravansaiba
          outputs: assets/snake-dark.svg?palette=github-dark

      - name: Generate snake (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sravansaiba
          outputs: assets/snake-light.svg?palette=github

      # ── Show what we got ───────────────────────────────────────────────
      - name: List assets
        run: ls -lh assets/

      # ── Commit everything back ─────────────────────────────────────────
      - name: Commit assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update readme stats [skip ci]"
          git push
