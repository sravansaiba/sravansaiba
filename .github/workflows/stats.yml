name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub UI
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      # ── GitHub Stats card ──────────────────────────────────────────────
      - name: Download stats card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=sravansaiba&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true&rank_icon=github" \
            -o assets/stats.svg || echo "stats fetch failed"

      # ── Streak card ────────────────────────────────────────────────────
      - name: Download streak card
        run: |
          curl -s "https://streak-stats.demolab.com/?user=sravansaiba&theme=tokyonight&hide_border=true" \
            -o assets/streak.svg || echo "streak fetch failed"

      # ── Top Languages card ─────────────────────────────────────────────
      - name: Download top languages card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=sravansaiba&layout=compact&theme=tokyonight&hide_border=true&langs_count=8&hide=html,css&card_width=500" \
            -o assets/langs.svg || echo "langs fetch failed"

      # ── Snake animation ────────────────────────────────────────────────
      - name: Generate snake (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sravansaiba
          outputs: assets/snake-dark.svg?palette=github-dark

      - name: Generate snake (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sravansaiba
          outputs: assets/snake-light.svg?palette=github

      # ── Commit everything back ─────────────────────────────────────────
      - name: Commit assets
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update readme stats [skip ci]"
          git push
